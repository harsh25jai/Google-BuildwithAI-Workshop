<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doodle Hurdles - Google Doodle Challenges</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/challenges/hurdles/style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <a href="/" class="back-link">← Back</a>
            <h1>Bangalore <span>Traffic</span></h1>
            <div id="game-stats">
                <div id="location">Dest: <span>Vidhan Sabha</span></div>
                <div id="score">Dist: <span id="score-val">0</span>m</div>
                <button id="pause-btn">Pause</button>
            </div>
        </header>

        <div id="game-viewport">
            <div id="road-wrapper">
                <div id="road">
                    <div id="horizon"></div>
                    <div class="fork-line"></div>
                </div>
                <div id="player"></div>
            </div>
        </div>

        <div id="controls">
            <p>Move <b>Left/Right</b> to dodge traffic!</p>
            <p>Watch for billboards to choose your path.</p>
        </div>

        <div id="pause-menu" class="hidden">
            <div class="modal">
                <h2>Game Paused</h2>
                <button id="resume-btn">Resume</button>
            </div>
        </div>

        <div id="game-over" class="hidden">
            <div class="modal">
                <h2>Stuck in Traffic!</h2>
                <p>Final Distance: <span id="final-score">0</span>m</p>
                <button id="restart-btn">Try Again</button>
            </div>
        </div>
    </div>
    <script type="module" src="/challenges/hurdles/main.js"></script>
</body>
</html>
